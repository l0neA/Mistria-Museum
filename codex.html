<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museu de Fields of Mistria — Checklist</title>
<style>
  :root{
    --bg:#1e1b2e; --card:#2a2540; --accent:#e8b86d; --accent2:#8fd3a3;
    --text:#f1ecf9; --muted:#b3a9c9; --border:#3d3660;
    --c-common:#7fce9a; --c-uncommon:#7ea8e0; --c-rare:#b48ef0; --c-legendary:#f0b94e; --c-veryrare:#f07a7a;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text);
    padding:12px; max-width:900px; margin:0 auto; padding-bottom:60px;
  }
  h1{font-size:1.25rem; margin:6px 0 2px 0}
  .sub{color:var(--muted); font-size:0.8rem; margin-bottom:12px}
  .sticky-top{position:sticky; top:0; background:var(--bg); z-index:10; padding-top:4px; padding-bottom:4px}
  .tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
  .tab{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:9px 14px; border-radius:20px; cursor:pointer; font-size:0.82rem; font-weight:600;
    min-height:36px; display:flex; align-items:center;
  }
  .tab.active{background:var(--accent); color:#2a2340; border-color:var(--accent)}
  .filter-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; align-items:center}
  .chip-btn{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:7px 12px; border-radius:16px; cursor:pointer; font-size:0.78rem; font-weight:600;
    min-height:34px; display:flex; align-items:center; gap:4px;
  }
  .chip-btn.active{background:var(--accent2); color:#16301f; border-color:var(--accent2)}
  .toggle-btn{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:7px 12px; border-radius:16px; cursor:pointer; font-size:0.78rem; font-weight:600;
    min-height:34px; display:flex; align-items:center; gap:6px;
  }
  .toggle-btn.on{background:#e08fa0; color:#2a1420; border-color:#e08fa0}
  .header-row{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .lang-switch{display:flex; gap:4px; flex-shrink:0; margin-top:4px}
  .lang-btn{
    background:var(--card); border:1px solid var(--border); color:var(--muted);
    padding:5px 9px; border-radius:8px; cursor:pointer; font-size:0.7rem; font-weight:700;
  }
  .lang-btn.active{background:var(--accent); color:#2a2340; border-color:var(--accent)}
  .storage-warning{
    background:#4a2a2a; border:1px solid #a05050; color:#f2c8c8; border-radius:10px;
    padding:10px 14px; margin-bottom:10px; font-size:0.8rem; display:none;
  }
  .storage-warning.show{display:block}
  .storage-warning b{color:#ffdede}
  .storage-warning.info{background:#213a4a; border:1px solid #4f88a8; color:#c9e6f5}
  .storage-warning.info b{color:#eaf7ff}
  .search-box{
    width:100%; padding:11px 12px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--text); margin-bottom:8px; font-size:0.95rem;
  }
  .progress-wrap{background:var(--card); border-radius:10px; padding:10px 14px; margin-bottom:10px; border:1px solid var(--border)}
  .progress-bar-bg{background:#171428; border-radius:6px; height:10px; overflow:hidden; margin-top:6px}
  .progress-bar-fill{background:linear-gradient(90deg,var(--accent2),var(--accent)); height:100%; width:0%; transition:width .3s}
  .cat-stats{display:flex; flex-direction:column; gap:6px; margin-bottom:4px}
  .cat-stat-row{display:flex; align-items:center; gap:8px; font-size:0.78rem}
  .cat-stat-name{width:90px; flex-shrink:0; color:var(--muted)}
  .cat-stat-bar-bg{flex:1; background:#171428; border-radius:5px; height:8px; overflow:hidden}
  .cat-stat-bar-fill{height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .cat-stat-pct{width:38px; text-align:right; color:var(--muted)}

  .objectives{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:10px}
  .objectives h3{margin:0 0 6px 0; font-size:0.9rem}
  .obj-list{list-style:none; padding:0; margin:0}
  .obj-list li{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.85rem; border-top:1px solid var(--border)}
  .obj-list li:first-child{border-top:none}
  .obj-list button{background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem}
  .obj-input-row{display:flex; gap:6px; margin-top:6px}
  .obj-input-row input{flex:1; padding:8px; border-radius:6px; border:1px solid var(--border); background:#171428; color:var(--text)}
  .obj-input-row button{padding:8px 12px; border-radius:6px; border:none; background:var(--accent); color:#2a2340; font-weight:700; cursor:pointer}

  .set-card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    margin-bottom:10px; overflow:hidden;
  }
  .set-card.complete{border-color:var(--accent2)}
  .set-header{
    padding:12px 14px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; font-weight:700; font-size:0.92rem; min-height:44px; gap:8px; flex-wrap:wrap;
  }
  .set-header.complete-bg{background:rgba(143,211,163,0.15)}
  .set-header .count{color:var(--muted); font-weight:400; font-size:0.78rem}
  .set-bulk-btn{
    background:#171428; border:1px solid var(--border); color:var(--muted);
    padding:5px 8px; border-radius:8px; cursor:pointer; font-size:0.68rem; font-weight:600;
    min-height:30px;
  }
  .set-bulk-btn:hover{color:var(--text); border-color:var(--accent2)}
  .select-all-row{
    display:flex; align-items:center; gap:10px; padding:8px 2px 10px 2px;
    border-bottom:1px solid var(--border); margin-bottom:4px; font-size:0.8rem;
    color:var(--muted); font-weight:600;
  }
  .select-all-row input[type=checkbox]{width:20px; height:20px; accent-color:var(--accent2)}
  .complete-badge{color:var(--accent2); font-size:0.75rem; font-weight:700; margin-left:6px}
  .set-body{padding:0 12px 10px 12px; display:none}
  .set-body.open{display:block}
  .item-row{
    display:flex; align-items:flex-start; gap:10px; padding:10px 2px; border-top:1px solid var(--border);
    font-size:0.87rem;
  }
  .item-row:first-child{border-top:none}
  .item-row input[type=checkbox]{width:24px; height:24px; flex-shrink:0; accent-color:var(--accent2); margin-top:2px}
  .item-main{flex:1; min-width:0}
  .item-top-line{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .item-icon{
    width:28px; height:28px; object-fit:contain; flex-shrink:0;
    background:#171428; border-radius:6px; padding:2px;
  }
  .item-name{font-weight:700}
  .item-name.done{text-decoration:line-through; color:var(--muted)}
  .fav-btn{background:none; border:none; cursor:pointer; font-size:1.05rem; padding:2px 4px; flex-shrink:0}
  .chips{display:flex; flex-wrap:wrap; gap:5px; margin-top:5px}
  .chip{
    font-size:0.7rem; padding:2px 8px; border-radius:10px; background:#171428; color:var(--muted);
    display:inline-flex; align-items:center; gap:3px; white-space:nowrap;
  }
  .badge-rarity{font-weight:700; color:#16150f}
  .badge-common{background:var(--c-common)}
  .badge-uncommon{background:var(--c-uncommon)}
  .badge-rare{background:var(--c-rare)}
  .badge-legendary{background:var(--c-legendary)}
  .badge-veryrare{background:var(--c-veryrare)}
  .item-actions{display:flex; gap:8px; margin-top:6px; align-items:center}
  .wiki-link{font-size:0.72rem; color:var(--accent); text-decoration:none; border:1px solid var(--border); padding:3px 8px; border-radius:8px}
  .add-obj-btn{font-size:0.72rem; color:var(--accent2); background:none; border:1px solid var(--border); padding:3px 8px; border-radius:8px; cursor:pointer}
  .note-input{
    width:100%; margin-top:6px; padding:6px 8px; font-size:0.78rem; border-radius:6px;
    border:1px solid var(--border); background:#171428; color:var(--text);
  }
  .note{color:var(--muted); font-size:0.78rem; margin-top:2px; font-style:italic}
  .empty-msg{color:var(--muted); font-size:0.85rem; text-align:center; padding:20px 0}
  .export-row{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap}
  .export-row button, .export-row label{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.78rem; font-weight:600;
  }
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="header-row">
  <div>
    <h1 id="app-title">🏛️ Museu de Fields of Mistria</h1>
    <div class="sub" id="app-subtitle">Checklist de doações — marque, filtre, favorite e anote. Tudo salvo automaticamente.</div>
  </div>
  <div class="lang-switch" id="lang-switch">
    <div class="lang-btn" data-lang="en">EN</div>
    <div class="lang-btn" data-lang="pt">PT</div>
  </div>
</div>

<div class="storage-warning" id="storage-warning"></div>

<div class="objectives" id="objectives-panel"></div>

<div class="progress-wrap">
  <div style="display:flex;justify-content:space-between;font-size:0.85rem">
    <span id="progress-label">Progresso geral</span>
    <span id="progress-count">0 / 0</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div class="cat-stats" id="cat-stats" style="margin-top:10px"></div>
</div>

<div class="export-row">
  <button id="btn-export">⬇️ Exportar progresso</button>
  <label for="import-file">⬆️ Importar progresso</label>
  <input type="file" id="import-file" accept=".json">
</div>

<div class="sticky-top">
  <div class="tabs" id="tabs"></div>
  <input class="search-box" id="search" placeholder="🔍 Buscar item, local, clima, estação, raridade...">
  <div class="filter-row" id="season-filters"></div>
  <div class="filter-row" id="weather-filters"></div>
  <div class="filter-row">
    <div class="toggle-btn" id="toggle-pending">☐ Só pendentes</div>
    <div class="toggle-btn" id="toggle-favs">☆ Só favoritos</div>
  </div>
</div>

<div id="content"></div>

  let out = text;

}

function autoTranslateName(name){
  const key = name.toLowerCase();
  if (NAME_OVERRIDES_PT[key]) return NAME_OVERRIDES_PT[key];
  const words = name.split(/([ -])/);
  const translated = words.map(w=>{
    if (w===' '||w==='-') return w;
    const lw = w.toLowerCase().replace(/[^a-zà-ú']/gi,'');
    if (WORD_MAP_PT[lw]){
      const tr = WORD_MAP_PT[lw];
      return tr.charAt(0).toUpperCase() + tr.slice(1);
    }
    return w;
  });
  return translated.join('');
}
function trItemName(item){
  if (lang === 'pt'){
    if (item.pt) return item.pt;
    return autoTranslateName(item.n);
  }
  return item.n;
}

      {n:"Loam Caterpillar", img:"https://fieldsofmistria.wiki.gg/images/thumb/Loam_caterpillar.png/40px-Loam_caterpillar.png?de5ce7", loc:"The Deep Woods", r:"uncommon"},
      {n:"Singing Katydid", img:"https://fieldsofmistria.wiki.gg/images/thumb/Singing_katydid.png/40px-Singing_katydid.png?dfc28a", loc:"The Deep Woods", r:"rare"},
    ]},
  ]},
};

// ---------- state ----------
let state = { checked:{}, favorites:{}, notes:{}, objectives:[] };

let stateLoaded = false;
let storageBroken = false;   // true só se NEM window.storage NEM localStorage funcionarem
let usingLocalFallback = false; // true se estiver salvando via localStorage do navegador (funciona bem!)
const STORAGE_KEY = 'museu-app-state';

async function storageGetRaw(){
  // tenta primeiro o window.storage (nuvem da Anthropic, ideal dentro do app oficial)
  try {
    const result = await window.storage.get(STORAGE_KEY, false);
    return { ok:true, value: result ? result.value : null, method:'cloud' };
  } catch(e){
    // se falhar, tenta o localStorage do navegador (funciona quando o arquivo é aberto fora do preview do app)
    try {
      const v = localStorage.getItem(STORAGE_KEY);
      return { ok:true, value:v, method:'local' };
    } catch(e2){
      return { ok:false, value:null, method:'none' };
    }
  }
}
async function storageSetRaw(jsonStr){
  try {
    const result = await window.storage.set(STORAGE_KEY, jsonStr, false);
    if (!result) throw new Error('sem confirmação do storage');
    return { ok:true, method:'cloud' };
  } catch(e){
    try {
      localStorage.setItem(STORAGE_KEY, jsonStr);
      return { ok:true, method:'local' };
    } catch(e2){
      return { ok:false, method:'none' };
    }
  }
}

async function loadState(){
  const res = await storageGetRaw();
  if (res.ok && res.value){
    try {
      const parsed = JSON.parse(res.value);
      state = Object.assign({checked:{}, favorites:{}, notes:{}, objectives:[]}, parsed);
      if (state.lang) lang = (state.lang === 'half') ? 'pt' : state.lang;
    } catch(e){ /* JSON inválido salvo antes — mantém estado padrão */ }
  }
  usingLocalFallback = (res.method === 'local');
  storageBroken = !res.ok;
  stateLoaded = true;
  render();
}
async function saveState(){
  if (!stateLoaded) return; // evita salvar um estado "em branco" por cima do que ainda está carregando
  const res = await storageSetRaw(JSON.stringify(state));
  const wasLocal = usingLocalFallback, wasBroken = storageBroken;
  usingLocalFallback = (res.method === 'local');
  storageBroken = !res.ok;
  if (usingLocalFallback !== wasLocal || storageBroken !== wasBroken){
    if (storageBroken) console.warn('Autosave indisponível: nem o storage do app nem o localStorage do navegador funcionaram aqui.');
    render();
  }
}

let currentWing = 'arqueologia';
let searchTerm = '';
let seasonFilter = 'all';
let weatherFilter = 'all';
let showOnlyPending = false;
let showOnlyFavs = false;
const openSets = {};

function itemId(wing, si, ii){ return wing + '__' + si + '__' + ii; }

function itemSeasons(set, item){
  return item.season || set.season || ['all'];
}

function rarityLabel(r){
  const map = {common:'Common', uncommon:'Uncommon', rare:'Rare', legendary:'Legendary', veryrare:'Very Rare'};
  return map[r] || r || '';
}

function wingProgress(wingKey){
  let total=0, done=0;
  DATA[wingKey].sets.forEach((set,si)=>{
    set.items.forEach((it,ii)=>{ total++; if(state.checked[itemId(wingKey,si,ii)]) done++; });
  });
  return {total, done};
}
function allProgress(){
  let total=0, done=0;
  Object.keys(DATA).forEach(w=>{ const c=wingProgress(w); total+=c.total; done+=c.done; });
  return {total, done};
}

function wikiUrl(name){
  const clean = name.replace(/'/g,'%27').replace(/ /g,'_');
  return 'https://fieldsofmistria.wiki.gg/wiki/' + clean;
}

// ---------- render: tabs ----------
function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  Object.keys(DATA).forEach(key=>{
    const c = wingProgress(key);
    const btn = document.createElement('div');
    btn.className = 'tab' + (key===currentWing ? ' active':'');
    btn.textContent = trWingLabel(DATA[key].label) + ' (' + c.done + '/' + c.total + ')';
    btn.onclick = ()=>{ currentWing = key; render(); };
    el.appendChild(btn);
  });
}

// ---------- render: season filters ----------
function renderSeasonFilters(){
  const el = document.getElementById('season-filters');
  el.innerHTML = '';
  SEASON_ORDER.forEach(s=>{
    const btn = document.createElement('div');
    btn.className = 'chip-btn' + (seasonFilter===s ? ' active':'');
    btn.textContent = lang==='en' ? SEASON_LABEL_EN[s] : SEASON_LABEL[s];
    btn.onclick = ()=>{ seasonFilter = s; render(); };
    el.appendChild(btn);
  });
}

function renderWeatherFilters(){
  const el = document.getElementById('weather-filters');
  el.innerHTML = '';
  WEATHER_ORDER.forEach(w=>{
    const btn = document.createElement('div');
    btn.className = 'chip-btn' + (weatherFilter===w ? ' active':'');
    btn.textContent = lang==='en' ? WEATHER_LABEL_EN[w] : WEATHER_LABEL[w];
    btn.onclick = ()=>{ weatherFilter = w; render(); };
    el.appendChild(btn);
  });
}

function renderToggles(){
  const p = document.getElementById('toggle-pending');
  p.className = 'toggle-btn' + (showOnlyPending ? ' on':'');
  p.textContent = (showOnlyPending ? '☑' : '☐') + ' ' + t('togglePending');
  p.onclick = ()=>{ showOnlyPending = !showOnlyPending; render(); };

  const f = document.getElementById('toggle-favs');
  f.className = 'toggle-btn' + (showOnlyFavs ? ' on':'');
  f.textContent = (showOnlyFavs ? '⭐' : '☆') + ' ' + t('toggleFavs');
  f.onclick = ()=>{ showOnlyFavs = !showOnlyFavs; render(); };
}

// ---------- render: progress ----------
function renderProgress(){
  const c = allProgress();
  document.getElementById('progress-count').textContent = c.done + ' / ' + c.total;
  const pct = c.total ? Math.round((c.done/c.total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = t('progressLabel') + ' (' + pct + '%)';

  const catEl = document.getElementById('cat-stats');
  catEl.innerHTML = '';
  Object.keys(DATA).forEach(key=>{
    const c2 = wingProgress(key);
    const pct2 = c2.total ? Math.round((c2.done/c2.total)*100) : 0;
    const row = document.createElement('div');
    row.className = 'cat-stat-row';
    row.innerHTML = '<div class="cat-stat-name">' + DATA[key].label + '</div>' +
      '<div class="cat-stat-bar-bg"><div class="cat-stat-bar-fill" style="width:' + pct2 + '%"></div></div>' +
      '<div class="cat-stat-pct">' + pct2 + '%</div>';
    catEl.appendChild(row);
  });
}

// ---------- render: objectives ----------
function renderObjectives(){
  const panel = document.getElementById('objectives-panel');
  panel.innerHTML = '';
  const h = document.createElement('h3');
  h.textContent = t('objectivesTitle');
  panel.appendChild(h);

  const list = document.createElement('ul');
  list.className = 'obj-list';
  if (state.objectives.length === 0){
    const empty = document.createElement('div');
    empty.className = 'note';
    empty.textContent = t('objectivesEmpty');
    list.appendChild(empty);
  }
  state.objectives.forEach((obj, idx)=>{
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.style.flex = '1';
    span.textContent = obj;
    const btn = document.createElement('button');
    btn.textContent = '✕';
    btn.onclick = ()=>{ state.objectives.splice(idx,1); saveState(); render(); };
    li.appendChild(span);
    li.appendChild(btn);
    list.appendChild(li);
  });
  panel.appendChild(list);

  const row = document.createElement('div');
  row.className = 'obj-input-row';
  const input = document.createElement('input');
  input.placeholder = t('objInputPlaceholder');
  input.id = 'new-obj-input';
  const addBtn = document.createElement('button');
  addBtn.textContent = t('addBtn');
  addBtn.onclick = ()=>{
    const v = input.value.trim();
    if (v){ state.objectives.push(v); saveState(); render(); }
  };
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ addBtn.click(); } });
  row.appendChild(input);
  row.appendChild(addBtn);
  panel.appendChild(row);
}

// ---------- render: content ----------
function itemMatchesSearch(set, item, term){
  if (!term) return true;
  const hay = [
    item.n, item.pt||'', item.loc||'', rarityLabel(item.r), set.name,
    (itemSeasons(set,item)||[]).map(s=>SEASON_LABEL[s]).join(' '),
    (item.weather||[]).join(' ')
  ].join(' ').toLowerCase();
  return hay.includes(term);
}

function itemMatchesSeason(set, item){
  if (seasonFilter === 'all') return true;
  const seasons = itemSeasons(set, item);
  return seasons.includes('all') || seasons.includes(seasonFilter);
}

function itemMatchesWeather(item){
  if (weatherFilter === 'all') return true;
  return !!(item.wtags && item.wtags.includes(weatherFilter));
}

function renderContent(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  const wing = DATA[currentWing];
  const term = searchTerm.trim().toLowerCase();
  let anySetShown = false;

  wing.sets.forEach((set, si)=>{
    const visibleItems = set.items.filter((it, ii)=>{
      const id = itemId(currentWing, si, ii);
      if (showOnlyPending && state.checked[id]) return false;
      if (showOnlyFavs && !state.favorites[id]) return false;
      if (!itemMatchesSeason(set, it)) return false;
      if (!itemMatchesWeather(it)) return false;
      if (!itemMatchesSearch(set, it, term)) return false;
      return true;
    });

    if (visibleItems.length === 0 && set.items.length > 0) return;
    if (set.items.length === 0 && (showOnlyPending || showOnlyFavs || seasonFilter!=='all' || weatherFilter!=='all' || term)) return;

    anySetShown = true;
    const doneCount = set.items.filter((it,ii)=>state.checked[itemId(currentWing,si,ii)]).length;
    const isComplete = set.items.length>0 && doneCount === set.items.length;
    const key = currentWing + '_' + si;
    const isOpen = openSets[key] || !!term;

    const card = document.createElement('div');
    card.className = 'set-card' + (isComplete ? ' complete' : '');

    const header = document.createElement('div');
    header.className = 'set-header' + (isComplete ? ' complete-bg' : '');

    const titleSpan = document.createElement('span');
    titleSpan.innerHTML = trSetName(set.name) + (isComplete ? '<span class="complete-badge">' + t('completeBadge') + '</span>' : '');

    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = doneCount + '/' + set.items.length;

    header.appendChild(titleSpan);
    header.appendChild(countSpan);
    header.onclick = ()=>{ openSets[key] = !openSets[key]; render(); };
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'set-body' + (isOpen ? ' open' : '');

    if (set.items.length > 0){
      const allChecked = set.items.every((it2,ii2)=>state.checked[itemId(currentWing,si,ii2)]);
      const noneChecked = set.items.every((it2,ii2)=>!state.checked[itemId(currentWing,si,ii2)]);
      const selectAllRow = document.createElement('div');
      selectAllRow.className = 'select-all-row';
      const selectAllCb = document.createElement('input');
      selectAllCb.type = 'checkbox';
      selectAllCb.checked = allChecked;
      selectAllCb.indeterminate = !allChecked && !noneChecked;
      selectAllCb.onchange = ()=>{
        const newVal = selectAllCb.checked;
        set.items.forEach((it2, ii2)=>{ state.checked[itemId(currentWing, si, ii2)] = newVal; });
        saveState(); render();
      };
      const selectAllLabel = document.createElement('span');
      selectAllLabel.textContent = t('selectAllLabel');
      selectAllRow.appendChild(selectAllCb);
      selectAllRow.appendChild(selectAllLabel);
      body.appendChild(selectAllRow);
    }

    if (set.note){
      const note = document.createElement('div');
      note.className = 'note';
      note.textContent = '⚠️ ' + trFreeText(set.note);
      body.appendChild(note);
    }

    if (set.items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'note';
      empty.textContent = t('noItemsYet');
      body.appendChild(empty);
    }

    set.items.forEach((it, ii)=>{
      const id = itemId(currentWing, si, ii);
      if (showOnlyPending && state.checked[id]) return;
      if (showOnlyFavs && !state.favorites[id]) return;
      if (!itemMatchesSeason(set, it)) return;
      if (!itemMatchesWeather(it)) return;
      if (!itemMatchesSearch(set, it, term)) return;

      const isChecked = !!state.checked[id];
      const isFav = !!state.favorites[id];

      const row = document.createElement('div');
      row.className = 'item-row';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = isChecked;
      cb.onchange = ()=>{ state.checked[id] = cb.checked; saveState(); render(); };
      row.appendChild(cb);

      const main = document.createElement('div');
      main.className = 'item-main';

      const topLine = document.createElement('div');
      topLine.className = 'item-top-line';

      if (it.img){
        const img = document.createElement('img');
        img.className = 'item-icon';
        img.src = it.img;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = function(){ this.style.display = 'none'; };
        topLine.appendChild(img);
      }

      const nameSpan = document.createElement('span');
      nameSpan.className = 'item-name' + (isChecked ? ' done' : '');
      nameSpan.textContent = trItemName(it);
      topLine.appendChild(nameSpan);

      const favBtn = document.createElement('button');
      favBtn.className = 'fav-btn';
      favBtn.textContent = isFav ? '⭐' : '☆';
      favBtn.onclick = ()=>{ state.favorites[id] = !isFav; saveState(); render(); };
      topLine.appendChild(favBtn);
      main.appendChild(topLine);

      const chips = document.createElement('div');
      chips.className = 'chips';
      const seasons = itemSeasons(set, it);
      seasons.forEach(s=>{
        const c = document.createElement('span');
        c.className = 'chip';
        c.textContent = lang==='en' ? SEASON_LABEL_EN[s] : SEASON_LABEL[s];
        chips.appendChild(c);
      });
      if (it.loc){
        const c = document.createElement('span');
        c.className = 'chip';
        c.textContent = '📍 ' + trFreeText(it.loc);
        chips.appendChild(c);
      }
      (it.weather||[]).forEach(w=>{
        const c = document.createElement('span');
        c.className = 'chip';
        c.textContent = trFreeText(w);
        chips.appendChild(c);
      });
      if (it.r){
        const c = document.createElement('span');
        c.className = 'chip badge-rarity badge-' + it.r;
        c.textContent = rarityLabel(it.r);
        chips.appendChild(c);
      }
      main.appendChild(chips);

      const actions = document.createElement('div');
      actions.className = 'item-actions';
      const link = document.createElement('a');
      link.className = 'wiki-link';
      link.href = wikiUrl(it.n);
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = t('wikiLink');
      actions.appendChild(link);

      const addObjBtn = document.createElement('button');
      addObjBtn.className = 'add-obj-btn';
      addObjBtn.textContent = t('addObjBtn');
      addObjBtn.onclick = ()=>{
        state.objectives.push(t('donatePrefix') + it.n);
        saveState(); render();
      };
      actions.appendChild(addObjBtn);
      main.appendChild(actions);

      const noteInput = document.createElement('input');
      noteInput.className = 'note-input';
      noteInput.placeholder = t('notePlaceholder');
      noteInput.value = state.notes[id] || '';
      noteInput.addEventListener('change', ()=>{
        state.notes[id] = noteInput.value;
        saveState();
      });
      main.appendChild(noteInput);

      row.appendChild(main);
      body.appendChild(row);
    });

    card.appendChild(body);
    content.appendChild(card);
  });

  if (!anySetShown){
    const empty = document.createElement('div');
    empty.className = 'empty-msg';
    empty.textContent = t('noResults');
    content.appendChild(empty);
  }
}

function renderStaticUI(){
  document.getElementById('app-title').textContent = t('title');
  document.getElementById('app-subtitle').textContent = t('subtitle');
  document.getElementById('search').placeholder = t('searchPlaceholder');
  document.getElementById('btn-export').textContent = t('exportBtn');
  document.querySelector('label[for="import-file"]').textContent = t('importBtn');
  document.querySelectorAll('#lang-switch .lang-btn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  const warnEl = document.getElementById('storage-warning');
  warnEl.classList.toggle('show', storageBroken || usingLocalFallback);
  warnEl.classList.toggle('info', !storageBroken && usingLocalFallback);
  if (storageBroken){
    warnEl.innerHTML = t('storageBrokenMsg');
  } else if (usingLocalFallback){
    warnEl.innerHTML = t('storageLocalMsg');
  }
}

function render(){
  renderStaticUI();
  renderTabs();
  renderSeasonFilters();
  renderWeatherFilters();
  renderToggles();
  renderProgress();
  renderObjectives();
  renderContent();
}

document.querySelectorAll('#lang-switch .lang-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    lang = btn.getAttribute('data-lang');
    state.lang = lang;
    saveState();
    render();
  });
});

document.getElementById('search').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  render();
});

document.getElementById('btn-export').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'museu-mistria-progresso.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('import-file').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try {
      const parsed = JSON.parse(ev.target.result);
      state = Object.assign({checked:{}, favorites:{}, notes:{}, objectives:[]}, parsed);
      saveState();
      render();
      alert(t('importSuccess'));
    } catch(err){
      alert(t('importError'));
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

loadState();
</script>
